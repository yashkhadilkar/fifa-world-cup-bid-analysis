# =============================================================================
# MSBA 405 "Should We Bid?" Pipeline Configuration
# =============================================================================
# Place this file in the same directory as pipeline.py.
# Fill in your Snowflake credentials below before running.
#
# Run:  python pipeline.py
# =============================================================================

[core]
local_scheduler = true
log_level = INFO

[PipelineConfig]
# -- GCP --
gcp_project = msba405-team-1
gcp_region = us-central1
gcp_zone = us-central1-b
gcs_bucket = msba405-team-1-data

# -- Dataproc --
cluster_name = msba405-prototype
cluster_image = 2.2-debian12
master_machine = n4-standard-2
worker_machine = n4-standard-2
num_workers = 2

# -- Snowflake (FILL THESE IN) --
sf_account = REPLACE_ME.us-central1.gcp
sf_user = REPLACE_ME
sf_password = REPLACE_ME
sf_database = FIFA_WC
sf_schema = ANALYTICS
sf_warehouse = WC_WH
